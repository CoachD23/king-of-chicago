name: king_of_chicago
description: "King of Chicago - An interactive fiction game set in 1920s Prohibition Chicago"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  yaml: ^3.1.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
