    line: "Mickey steps out alone. No bodyguard. Either very brave or very sure of himself. He straightens his coat and walks straight toward you."
  - speaker: mickey
    line: "Vincent. My condolences. Truly. Don Castellano was a man of substance."
  - speaker: mickey
    line: "I thought it best we talk before things get... complicated."
