dialogue:
  - speaker: narrator
    line: "Enzo's kitchen. Dawn light through lace curtains. Tommy sits at the table with a dishrag pressed to his head. It's already soaked through. Rosa boils water without being asked."
  - speaker: enzo
    line: "So. Now we know."
  - speaker: enzo
    line: "O'Banion didn't just kill my brother. He's coming for all of us."
  - speaker: rosa
    line: "Vincenzo, your hand."
  - speaker: narrator
    line: "You look down. Blood. Not yours -- Tommy's, from when you pulled him out of the car. Your hands are steady. That's either a good thing or a terrible one."
  - speaker: enzo
    line: "We have maybe two days before Mickey makes a real move on the South Side. Maybe less. What happens next is up to you, Vince."
  - speaker: narrator
    line: "The kitchen is quiet. Coffee percolates. Somewhere outside, a milk truck rattles past. Chicago doesn't stop for anybody."
